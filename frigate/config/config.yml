version: 0.17-0

logger:
  default: info
  logs:
    frigate.object_processing: debug

mqtt:
  enabled: true
  host: mqtt
  port: 1883

detectors:
  apple_silicon:
    type: zmq
    endpoint: tcp://host.docker.internal:5555

model:
  path: /config/model_cache/yolo.onnx
  model_type: yolo-generic
  width: 320
  height: 320
  input_tensor: nchw
  input_dtype: float

objects:
  track:
    - person
    - car
    - dog

record:
  enabled: true

go2rtc:
  streams:
    cam1_main:
      - ffmpeg:http://192.168.1.234/flv?port=1935&app=bcs&stream=channel0_main.bcs&user=admin&password={FRIGATE_REOLINK_PASSWORD}#video=copy#audio=copy
    cam1_sub:
      - ffmpeg:http://192.168.1.234/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user=admin&password={FRIGATE_REOLINK_PASSWORD}

cameras:
  driveway:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam1_main
          input_args: preset-rtsp-restream
          roles:
            - record
        - path: rtsp://127.0.0.1:8554/cam1_sub
          input_args: preset-rtsp-restream
          roles:
            - detect
    zones:
      stairway:
        coordinates: 0.577,0.294,0.862,0.833,0.994,0.287,0.996,0.023
        loitering_time: 0
        friendly_name: Stairway
      drive:
        coordinates: 0.525,0.243,0.224,0.724,0.265,0.991,0.846,1,0.854,0.838
        loitering_time: 0
        friendly_name: Drive
