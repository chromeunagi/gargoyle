version: 0.17-0

logger:
  default: info
  logs:
    frigate.object_processing: debug

mqtt:
  enabled: true
  host: mqtt
  port: 1883

detectors:
  apple_silicon:
    type: zmq
    endpoint: tcp://host.docker.internal:5555

model:
  path: /config/model_cache/yolo.onnx
  model_type: yolo-generic
  width: 320
  height: 320
  input_tensor: nchw
  input_dtype: float

objects:
  track:
    - person
    - car
    - dog

record:
  enabled: true

go2rtc:
  streams:
    cam1_main:
      - rtsp://admin:{FRIGATE_REOLINK_PASSWORD}@192.168.1.234:554/h264Preview_01_main
    cam1_sub:
      - rtsp://admin:{FRIGATE_REOLINK_PASSWORD}@192.168.1.234:554/h264Preview_01_sub

cameras:
  driveway:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cam1_main
          input_args: preset-rtsp-restream
          roles:
            - record
        - path: rtsp://127.0.0.1:8554/cam1_sub
          input_args: preset-rtsp-restream
          roles:
            - detect
    zones:
      stairway:
        coordinates: 0.567,0.294,0.866,0.834,0.998,0.288,1,0.024,0.606,0.097
        loitering_time: 0
        friendly_name: Stairway
        inertia: 3
      drive:
        coordinates: 0.525,0.243,0.224,0.724,0.265,0.991,0.846,1,0.854,0.838
        loitering_time: 0
        friendly_name: Drive
    motion:
      mask: 
        0.155,0.334,0.37,0.261,0.42,0.466,0.429,0.659,0.251,0.891,0.145,0.776,0.099,0.624,0.101,0.462
